name: Deploy Helm Chart

env:
  HELM_VERSION: '3.14.3'
  HELM_REGISTRY: ghcr.io/${{ github.repository_owner }}/helm-charts

on:
  push:
    branches:
      - dev
      - release
  workflow_dispatch:
    inputs:
      name:
        description: "Manual trigger for Helm chart packaging and pushing"
      release_type:
        description: "Release or snapshot version?"
        required: true
        default: "SNAPSHOT"
        options:
          - "SNAPSHOT"
          - "RELEASE"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4.1.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Login with Helm
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.HELM_REGISTRY }} --username ${{ github.repository_owner }} --password-stdin

      - name: Push Helm chart to repository
        run: |
          VERSION=$(cat ./VERSION)
          if [ ${{ github.event.inputs.environment }} == "SNAPSHOT" ] || [ $BRANCH == "dev" ]
          then
            VERSION=$VERSION-SNAPSHOT
          fi
          helm package "charts/fairspace" --version "$VERSION"
          helm push "fairspace-${VERSION}.tgz" "oci://${{ env.HELM_REGISTRY }}"
          echo "Pushed package to repository"

      - name: Clean up
        run: |
          rm -rf "fairspace*.tgz"
